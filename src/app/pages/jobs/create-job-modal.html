<form action="" class="w-full">
    <div class="input-field-wrapper">
        <label class="form-label">Job Title</label>
        <input type="text" class="form-field" placeholder="Enter job title" />
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Department</label>
        <input type="text" class="form-field" placeholder="e.g. Engineering" />
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Location</label>
        <input type="text" class="form-field" placeholder="e.g. Bangalore" />
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Employment Type</label>
        <select class="form-field">
            <option value="">Select type</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Internship</option>
            <option>Contract</option>
        </select>
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Experience (Years)</label>
        <input type="number" class="form-field" min="0" value="0" />
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="input-field-wrapper">
            <label class="form-label">Min Salary</label>
            <input type="number" class="form-field" min="0" />
        </div>

        <div class="input-field-wrapper">
            <label class="form-label">Max Salary</label>
            <input type="number" class="form-field" min="0" />
        </div>
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Required Skills</label>
        <input type="text" class="form-field" placeholder="e.g. Angular, Node.js, MongoDB" />
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Required Skills</label>
        <textarea rows="4" class="form-field" placeholder="Enter job details..."></textarea>
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Status</label>
        <select class="form-field">
            <option>Open</option>
            <option>Closed</option>
        </select>
    </div>

    <div class="flex justify-end gap-3">
        <button type="button" class="btn">
            Cancel
        </button>

        <button type="submit" class="btn">
            Save Job
        </button>
    </div>

</form>
