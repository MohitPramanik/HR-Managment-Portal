<section
    app-table
    [tableLabel]="'Candidates'"
    [headerButtonLabel]="'Add'"
    (headerButtonActionClicked)="openCreateCandidateModal()"
    [tableHeaders]="['Name', 'Email', 'Job', 'Experience', 'Status', 'Actions']"
    [tableData]="candidates"
    [tableDataSequence]="['name', 'email', 'jobTitle','experience']"
>
    <!-- Filters -->
    <div th-content-area class="input-field-wrapper grid! sm:grid-cols-3 gap-3!">
        <input type="text" placeholder="Search..." class="form-field" />

        <select class="form-field">
            <option>All Jobs</option>
        </select>

        <select class="form-field">
            <option>All Status</option>
            <option>Applied</option>
            <option>Interview</option>
            <option>Selected</option>
            <option>Rejected</option>
        </select>
    </div>

</section>

@if(isCreateCandidateModalOpen()) {
    <div
        app-modal
        [modalTitle]="'Create Candidate'"
        [(isShown)]="isCreateCandidateModalOpen"
    >
        <div create-candidate-modal class="w-full"></div>
    </div>
}
