<form action="" class="w-full">

    <div class="input-field-wrapper">
        <label class="form-label">Department Name</label>
        <input type="text" class="form-field" placeholder="Enter department name" />
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Head of Department</label>
        <select class="form-field">
            <option value="">Select department head</option>
            <option>Amit Sharma</option>
            <option>Priya Verma</option>
            <option>Rahul Singh</option>
            <option>Sneha Kapoor</option>
        </select>
    </div>

    <div class="grid grid-cols-2 gap-2">
        <div class="input-field-wrapper">
            <label class="form-label">Number of Employees</label>
            <input type="number" class="form-field" min="0" value="0" />
        </div>

        <div class="input-field-wrapper">
            <label class="form-label">Open Positions</label>
            <input type="number" class="form-field" min="0" value="0" />
        </div>
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Status</label>
        <select class="form-field">
            <option>Active</option>
            <option>Inactive</option>
        </select>
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Description</label>
        <textarea rows="4" class="form-field" placeholder="Add notes or description about the department..."></textarea>
    </div>

    <div class="flex justify-end gap-3">
        <button type="button" class="btn-outline">
            Cancel
        </button>
        

        <button type="submit" class="btn">
            Save Department
        </button>
    </div>

</form>
