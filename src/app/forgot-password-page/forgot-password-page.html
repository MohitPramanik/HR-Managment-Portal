<div class="min-h-full flex items-center justify-center bg-gray-50 px-4">

  <div class="w-full max-w-md bg-white p-6 rounded-xl shadow-xl" animate.enter="appear-up">

    <h2 class="text-2xl font-semibold text-center mb-1">
      Forgot Password
    </h2>
    <p class="text-sm text-gray-500 text-center mb-6">
      Enter your email to receive a password reset link
    </p>

    <form class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          placeholder="Enter your email"
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition"
      >
        Send Reset Link
      </button>

    </form>

    <p class="text-sm text-center mt-5">
      Remember your password?
      <a routerLink="/login" class="text-blue-600 hover:underline ml-1">
        Back to Login
      </a>
    </p>

  </div>

</div>
